<header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
  <div class="container mx-auto px-4 h-16 flex items-center justify-between">
    <!-- Brand -->
    <a routerLink="/" class="flex items-center gap-3">
      <img src="assets/logo/logo.webp" alt="Logo" class="w-8 h-8 rounded-full" />
      <div class="flex flex-col">
        <span class="font-bold text-amber-500 leading-none">Nordikos</span>
        <span class="text-[10px] text-zinc-400 leading-none">Grill House</span>
      </div>
    </a>

    <!-- Navigation Links -->
    <nav class="hidden md:flex items-center gap-6">
      <a 
        routerLink="/home" 
        routerLinkActive="text-amber-500"
        [routerLinkActiveOptions]="{exact: true}"
        class="text-sm font-medium text-zinc-400 hover:text-zinc-100 transition-colors"
      >
        Inicio
      </a>
      <a 
        routerLink="/products" 
        routerLinkActive="text-amber-500"
        class="text-sm font-medium text-zinc-400 hover:text-zinc-100 transition-colors"
      >
        Productos
      </a>
    </nav>

    <!-- User Menu / Logout -->
    <div class="flex items-center gap-4">
      <button
        (click)="logOut()"
        class="flex items-center gap-2 text-zinc-400 hover:text-red-400 transition-colors text-sm font-medium"
      >
        <span>Salir</span>
        <lucide-icon name="log-out" class="w-4 h-4"></lucide-icon>
      </button>
    </div>
  </div>
</header>
