<div class="min-h-screen bg-[#121212] text-[#F5F5F5]">
  <app-navbar />

  <main class="max-w-7xl mx-auto px-4 py-6 space-y-8">

    <!-- ============================= -->
    <!-- CATEGORY FILTER -->
    <!-- ============================= -->
    <section
      #categoryScroller
      class="relative flex gap-2 overflow-x-auto scrollbar-hide pb-1"
    >
      <!-- Todas -->
      <button
        class="px-4 py-2 rounded-full text-sm font-medium transition whitespace-nowrap shrink-0"
        [class.bg-[#FFB300]]="selectedCategoryId() === null"
        [class.text-[#121212]]="selectedCategoryId() === null"
        [class.bg-[#1E1E1E]]="selectedCategoryId() !== null"
        [class.text-[#F5F5F5]]="selectedCategoryId() !== null"
        (click)="showAllCategories()"
      >
        Todas las categorías
      </button>

      @for (category of categories(); track category.id) {
        <button
          class="px-4 py-2 rounded-full text-sm font-medium transition whitespace-nowrap shrink-0"
          [class.bg-[#FFB300]]="selectedCategoryId() === category.id"
          [class.text-[#121212]]="selectedCategoryId() === category.id"
          [class.bg-[#1E1E1E]]="selectedCategoryId() !== category.id"
          [class.text-[#F5F5F5]]="selectedCategoryId() !== category.id"
          (click)="filterProductsByCategory(category.id)"
        >
          {{ categoryNameOverrides()[category.id] || category.nombre }}
        </button>
      }

      <!-- Fade scroll -->
      <div class="pointer-events-none absolute right-0 top-0 h-full w-12 bg-linear-to-l from-[#121212]"></div>
    </section>

    <!-- ============================= -->
    <!-- GROUPED PRODUCTS -->
    <!-- ============================= -->
    @for (group of groupedProducts(); track group.categoryId) {
      <app-product-group-card
        [group]="group"
        [displayName]="group.displayName"
        [editingCategoryId]="editingCategoryId()"
        [editingCategoryName]="editingCategoryName()"
        (addProduct)="addProductToCategory($event)"
        (toggleVisibility)="toggleVisibility($event)"
        (startEditingCategory)="startEditingCategory($event.id, $event.name)"
        (cancelEditingCategory)="cancelEditingCategory()"
        (updateCategoryNameInput)="onEditingCategoryNameInput($event)"
        (saveCategoryName)="saveCategoryName($event.id, $event.originalName)"
        (editProduct)="editProduct($event)"
        (deleteProduct)="deleteProduct($event)"
      />
    }
  </main>
</div>
