<app-navbar />

<div class="min-h-screen bg-[#121212] text-[#F5F5F5] pb-24 no-print">
  <div class="max-w-4xl mx-auto px-4 sm:px-5 py-6">
    
    <!-- Header -->
    <app-order-detail-header 
      [order]="order()"
      [orderId]="orderId()"
      (goBack)="goBack()"
      (openTicket)="openTicket($event)"
      (shareTicketPDF)="shareTicketPDF()"
    />

    @if (loading()) {
      <div class="flex flex-col items-center justify-center py-20 gap-4">
        <lucide-icon name="loader-2" class="w-10 h-10 text-amber-500 animate-spin" />
        <p class="text-zinc-500 font-medium">Cargando detalles...</p>
      </div>
    } @else if (order()) {
      
      <!-- Info General -->
      <app-order-detail-summary
        [order]="order()"
        [currentTime]="currentTime()"
      />

      <!-- Items de la Orden -->
      <app-order-detail-items
        [order]="order()"
        [items]="items()"
      />

      <!-- Resumen de Totales -->
      <app-order-detail-totals
        [order]="order()"
      />

    }

  </div>
</div>

<!-- Modal de Ticket (Overlay) -->
@if (showTicket()) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center p-0 sm:p-4 bg-black/90 backdrop-blur-md print:bg-white print:p-0 no-print">
    <div class="relative w-full h-full sm:h-auto sm:max-w-lg sm:max-h-[90vh] overflow-y-auto rounded-none sm:rounded-3xl bg-[#121212] border-0 sm:border sm:border-white/10 p-4 sm:p-8 animate-in zoom-in-95 print:bg-white print:border-none print:p-0 print:max-w-none print:max-h-none print:overflow-visible">
      
      @if (orderIdNumber(); as id) {
        <app-ticket-print 
          [orderId]="id" 
          [ticketType]="ticketType()" 
          (readyToPrint)="onTicketReady()"
          (close)="showTicket.set(false)"
        />
      }
    </div>
  </div>
}

<!-- Botón Flotante para Agregar más productos -->
@if (order() && order().estado_pedido === 'confirmado' && order().estado_pago === 'pendiente') {
  <button
    (click)="addMoreProducts()"
    class="fixed bottom-6 right-6 z-20 flex items-center gap-3 px-6 py-4 rounded-2xl bg-amber-500 text-black font-bold shadow-2xl hover:bg-amber-400 active:scale-95 transition-all animate-in fade-in zoom-in-95"
  >
    <lucide-icon name="folder-open" class="w-6 h-6" />
    <span>Agregar Productos</span>
  </button>
}
