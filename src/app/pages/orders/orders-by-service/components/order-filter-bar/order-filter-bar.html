<div class="mb-8 space-y-4">
  <div class="flex items-center gap-2 overflow-x-auto pb-2">
    <button (click)="setDateFilter.emit('today')" [class.bg-amber-500]="dateFilterType() === 'today'"
      [class.text-black]="dateFilterType() === 'today'"
      class="px-4 py-2 rounded-xl bg-white/5 border border-white/5 text-sm font-medium hover:bg-white/10 transition whitespace-nowrap">
      Hoy
    </button>
    <button (click)="setDateFilter.emit('week')" [class.bg-amber-500]="dateFilterType() === 'week'"
      [class.text-black]="dateFilterType() === 'week'"
      class="px-4 py-2 rounded-xl bg-white/5 border border-white/5 text-sm font-medium hover:bg-white/10 transition whitespace-nowrap">
      Última semana
    </button>
    <button (click)="setDateFilter.emit('month')" [class.bg-amber-500]="dateFilterType() === 'month'"
      [class.text-black]="dateFilterType() === 'month'"
      class="px-4 py-2 rounded-xl bg-white/5 border border-white/5 text-sm font-medium hover:bg-white/10 transition whitespace-nowrap">
      Último mes
    </button>
    <button (click)="setDateFilter.emit('custom')" [class.bg-amber-500]="dateFilterType() === 'custom'"
      [class.text-black]="dateFilterType() === 'custom'"
      class="px-4 py-2 rounded-xl bg-white/5 border border-white/5 text-sm font-medium hover:bg-white/10 transition whitespace-nowrap">
      Personalizado
    </button>
  </div>

  @if (dateFilterType() === 'custom') {
  <div class="flex flex-wrap items-end gap-4 p-4 rounded-2xl bg-white/5 border border-white/5">
    <div class="space-y-1.5 flex-1 min-w-37.5">
      <label class="text-xs text-zinc-500 font-medium">Desde</label>
      <input type="date" [value]="customStartDate()" (change)="customStartChange.emit($any($event.target).value)"
        class="block w-full bg-[#121212] border border-white/10 rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-amber-500/50 scheme-dark">
    </div>
    <div class="space-y-1.5 flex-1 min-w-37.5">
      <label class="text-xs text-zinc-500 font-medium">Hasta</label>
      <input type="date" [value]="customEndDate()" (change)="customEndChange.emit($any($event.target).value)"
        class="block w-full bg-[#121212] border border-white/10 rounded-lg px-3 py-2 text-sm text-white outline-none focus:border-amber-500/50 scheme-dark">
    </div>
    <button 
        (click)="applyFilter.emit()"
        class="px-6 py-2 h-9 rounded-lg bg-amber-500 text-black font-bold text-sm hover:bg-amber-400 transition active:scale-95"
      >
        Filtrar
      </button>
    </div>
  }

  <!-- ACCIONES MASIVAS -->
  @if (filteredCount() > 0) {
    <div class="flex items-center gap-2 pt-2 animate-in fade-in slide-in-from-left-2">
      <span class="text-xs text-zinc-500 font-bold uppercase tracking-widest mr-2">Acciones rápidas ({{ filteredCount() }}):</span>
      <button 
        (click)="bulkUpdate.emit({ type: 'pedido', status: 'entregado' })"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-emerald-500/10 text-emerald-500 border border-emerald-500/20 hover:bg-emerald-500/20 transition text-[10px] font-bold uppercase"
      >
        <lucide-icon name="check-circle" class="w-3 h-3"></lucide-icon>
        Entregar todo
      </button>
      <button 
        (click)="bulkUpdate.emit({ type: 'pago', status: 'pagado' })"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-amber-500/10 text-amber-500 border border-amber-500/20 hover:bg-amber-500/20 transition text-[10px] font-bold uppercase"
      >
        <lucide-icon name="dollar-sign" class="w-3 h-3"></lucide-icon>
        Pagar todo
      </button>
    </div>
  }
</div>
