<div class="h-screen bg-[#050505] text-zinc-100 flex flex-col overflow-hidden">

  <!-- TOP BAR (ULTRA COMPACT) -->
  <header class="h-12 shrink-0 bg-[#0A0A0A] border-b border-white/5 px-4 flex items-center justify-between z-40">
    <div class="flex items-center gap-3">
      <a
        routerLink="/orders"
        class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 text-zinc-400 flex items-center justify-center transition"
        title="Volver"
      >
        <lucide-icon name="arrow-left" class="w-4 h-4" />
      </a>
      <div class="h-4 w-px bg-white/10 mx-1"></div>
      <h1 class="text-xs font-black tracking-widest text-white uppercase">
        {{ editingOrderId() ? 'Editando #' + editingOrderId() : 'Nueva Orden' }}
      </h1>
    </div>

    <div class="flex items-center gap-3">
      <div class="hidden md:flex items-center gap-2 px-2 py-1 rounded-md bg-emerald-500/10 border border-emerald-500/20">
        <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
        <span class="text-[9px] text-emerald-500 font-black uppercase tracking-widest">POS Activo</span>
      </div>

      <!-- MOBILE CART BUTTON -->
      <a 
        routerLink="/orders/new/cart"
        class="lg:hidden relative flex items-center gap-2 pl-3 pr-2 py-1.5 rounded-xl bg-amber-500 text-zinc-950 shadow-lg"
      >
        <span class="text-xs font-black tracking-tighter">${{ cartTotal() | number:'1.2-2' }}</span>
        <div class="h-3.5 w-px bg-black/20"></div>
        <lucide-icon name="shopping-cart" class="w-4 h-4" />
        @if (cartCount() > 0) {
          <span class="absolute -top-1 -right-1 min-w-4 h-4 px-1 flex items-center justify-center text-[9px] font-black rounded-full bg-white text-amber-600 border border-amber-500 shadow-sm">
            {{ cartCount() }}
          </span>
        }
      </a>
    </div>
  </header>

  <div class="flex-1 flex overflow-hidden">
    
    <!-- LEFT PANEL (PRODUCTS) -->
    <main class="flex-1 flex flex-col relative overflow-hidden">
      
      <!-- MOBILE STEP TABS -->
      <div class="lg:hidden flex bg-[#0A0A0A] border-b border-white/5 p-1 mx-4 mt-3 rounded-xl">
        <a
          routerLink="/orders/new/browse"
          routerLinkActive="bg-white/5 text-amber-500"
          class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest text-zinc-500 transition"
        >
          <lucide-icon name="layout-grid" class="w-3.5 h-3.5" />
          Menú
        </a>
        <a
          routerLink="/orders/new/cart"
          routerLinkActive="bg-white/5 text-amber-500"
          #cartLink="routerLinkActive"
          class="flex-1 flex items-center justify-center gap-2 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest text-zinc-500 transition"
        >
          <lucide-icon name="shopping-bag" class="w-3.5 h-3.5" />
          Carrito
        </a>
      </div>

      <div class="flex-1 overflow-hidden">
        <router-outlet />
      </div>

    </main>

    <!-- RIGHT PANEL (CART - DESKTOP ONLY) -->
    <aside class="hidden lg:flex w-[416px] shrink-0 border-l border-white/5 bg-[#0A0A0A] flex-col overflow-hidden">
      <app-new-order-cart class="h-full" />
    </aside>

  </div>

</div>
