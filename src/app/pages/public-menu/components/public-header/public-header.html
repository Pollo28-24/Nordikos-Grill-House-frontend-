<header class="sticky top-0 z-40 bg-[#F8F5EE]/90 backdrop-blur-md border-b border-[#E2D7B7]/50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 sm:py-4 flex flex-col gap-3 sm:gap-4">
    
    <!-- TOP ROW: Logo, Search (Desktop), Cart -->
    <div class="flex items-center justify-between gap-4">
      
      <!-- Logo -->
      <div class="flex items-center gap-2 sm:gap-3 shrink-0">
        <img src="assets/logo/logo_Nordicos.webp" alt="Nordikos Logo" class="h-9 sm:h-11 w-auto object-contain drop-shadow-sm">
        <h1 class="text-base sm:text-lg font-black tracking-tight text-gray-900">Nordikos</h1>
      </div>
      
      <!-- SEARCH (Desktop) -->
      <div class="hidden md:block relative flex-1 max-w-xl mx-auto">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
          <lucide-icon name="search" class="h-4 w-4"></lucide-icon>
        </span>
        <input 
          type="text" 
          placeholder="¿Qué se te antoja hoy?"
          [value]="searchQuery()"
          (input)="handleSearch($event)"
          class="w-full pl-11 pr-4 h-11 bg-white border border-[#E2D7B7]/60 rounded-full text-sm font-medium outline-none transition-all focus:ring-2 focus:ring-orange-500 shadow-sm placeholder-gray-400"
        >
      </div>

      <!-- CART TOGGLE -->
      <button 
        (click)="onCartClick.emit()"
        class="relative p-2.5 bg-white border border-[#E2D7B7]/80 rounded-full shadow-sm hover:shadow-md hover:bg-gray-50 transition-all active:scale-95 shrink-0 text-gray-700"
        [class.animate-bump]="cartBumping()"
      >
        <lucide-icon name="shopping-cart" class="h-5 w-5"></lucide-icon>
        @if (cartCount() > 0) {
          <span class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] font-black h-5 w-5 flex items-center justify-center rounded-full shadow-sm border-2 border-[#F8F5EE]">
            {{ cartCount() }}
          </span>
        }
      </button>
    </div>

    <!-- SEARCH (Mobile) -->
    <div class="relative md:hidden w-full">
      <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-400">
        <lucide-icon name="search" class="h-4 w-4"></lucide-icon>
      </span>
      <input 
        type="text" 
        placeholder="¿Qué se te antoja hoy?"
        [value]="searchQuery()"
        (input)="handleSearch($event)"
        class="w-full pl-11 pr-4 h-11 bg-white border border-[#E2D7B7]/60 rounded-full text-sm font-medium outline-none transition-all focus:ring-2 focus:ring-orange-500 shadow-sm placeholder-gray-400"
      >
    </div>
  </div>
</header>
