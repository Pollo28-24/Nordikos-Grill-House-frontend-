<div
  class="group flex items-center gap-4 p-4 bg-[#181818] rounded-2xl border border-[#2A2A2A] shadow-sm shadow-black/30 hover:border-[#FFB300]/40 hover:bg-[#202020] transition-all mb-4"
  [class.opacity-60]="category().visible === false"
>
  <!-- DRAG -->
  <div
    class="cursor-grab active:cursor-grabbing text-[#444] hover:text-[#666] transition"
  >
    <lucide-icon name="grip-vertical" class="w-5 h-5"></lucide-icon>
  </div>

  <!-- CONTENT -->
  <div class="flex-1 space-y-2">
    <input
      type="text"
      [value]="category().nombre"
      (change)="nameChanged.emit($any($event.target).value)"
      placeholder="Nombre de categoría"
      class="w-full bg-transparent text-lg font-medium text-[#F5F5F5] border-none focus:ring-0 p-0 border-b border-transparent focus:border-[#FFB300] transition"
    />

    <div class="flex items-center gap-2">
      <lucide-icon name="file-text" class="w-3 h-3 text-[#444]" />

      <input
        type="text"
        [value]="category().descripcion || ''"
        (change)="descriptionChanged.emit($any($event.target).value)"
        placeholder="Añadir descripción..."
        class="w-full bg-transparent text-sm text-[#9CA3AF] border-none focus:ring-0 p-0 placeholder-[#444]"
      />
    </div>

    <div class="flex items-center gap-3 text-xs text-[#666]">
      <span class="bg-[#2A2A2A] px-2 py-0.5 rounded-md">
        {{ category().products_count || 0 }} productos
      </span>

      @if (isUpdating()) {
      <span class="text-[#FFB300] flex items-center gap-1">
        <lucide-icon name="loader-2" class="w-3 h-3 animate-spin" />
        Guardando...
      </span>
      }
    </div>
  </div>

  <!-- ACTIONS -->
  <div
    class="flex items-center gap-2 opacity-70 group-hover:opacity-100 transition"
  >
    <button
      (click)="addProduct.emit()"
      class="p-2 text-[#9CA3AF] hover:text-[#FFB300] hover:bg-[#2A2A2A] rounded-lg transition"
      title="Agregar producto"
    >
      <lucide-icon name="plus-circle" class="w-5 h-5" />
    </button>

    <button
      (click)="toggleVisibility.emit()"
      class="p-2 text-[#9CA3AF] hover:text-[#F5F5F5] hover:bg-[#2A2A2A] rounded-lg transition"
      [title]="category().visible === false ? 'Mostrar categoría' : 'Ocultar categoría'"
    >
      <lucide-icon
        [name]="category().visible === false ? 'eye-off' : 'eye'"
        class="w-5 h-5"
      />
    </button>

    <button
      (click)="delete.emit()"
      class="p-2 text-[#9CA3AF] hover:text-red-500 hover:bg-[#2A2A2A] rounded-lg transition"
      title="Eliminar categoría"
    >
      <lucide-icon name="trash-2" class="w-5 h-5" />
    </button>
  </div>
</div>
